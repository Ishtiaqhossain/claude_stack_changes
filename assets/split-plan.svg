<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <rect width="820" height="560" rx="10" fill="#0d1117"/>
  <rect width="820" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="820" height="10" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="410" y="22" fill="#8b949e" text-anchor="middle" font-size="12">Claude Code — stack-changes</text>
  <g xml:space="preserve">
    <text x="24" y="64"><tspan fill="#8b949e">~/my-repo ❯ </tspan><tspan fill="#58a6ff">/stack-changes create a Split Plan for my 1,000-line diff</tspan></text>
    <text x="24" y="104" fill="#3fb950" font-weight="bold">● Split Plan</text>
    <text x="24" y="140" fill="#e6edf3" font-weight="bold">  Final goal</text>
    <text x="24" y="162" fill="#c9d1d9">    Add CSV/JSON export, filtering, sorting, budgets, and CLI wiring.</text>
    <text x="24" y="198" fill="#e6edf3" font-weight="bold">  Concerns currently mixed together</text>
    <text x="24" y="220" fill="#c9d1d9">    3 refactors + 5 features bundled in one 1,019-line diff</text>
    <text x="24" y="256" fill="#e6edf3" font-weight="bold">  Proposed stack</text>
    <text x="24" y="278" fill="#3fb950">    [1/8] refactor  typed Money / Transaction model</text>
    <text x="24" y="300" fill="#3fb950">    [2/8] refactor  route rendering via a query pipeline</text>
    <text x="24" y="322" fill="#3fb950">    [3/8] refactor  extract a Formatter interface</text>
    <text x="24" y="344" fill="#58a6ff">    [4/8] feat      add export formats (CSV / JSON / …)</text>
    <text x="24" y="366" fill="#58a6ff">    [5/8] feat      add filtering</text>
    <text x="24" y="388" fill="#58a6ff">    [6/8] feat      add sorting + grouping</text>
    <text x="24" y="410" fill="#58a6ff">    [7/8] feat      add per-category budgets</text>
    <text x="24" y="432" fill="#58a6ff">    [8/8] feat      wire the CLI end-to-end</text>
    <text x="24" y="468" fill="#e6edf3" font-weight="bold">  Land order</text>
    <text x="24" y="490" fill="#c9d1d9">    #1 → #2 → … → #8   (refactors first; each step green on its own)</text>
    <text x="24" y="528" fill="#3fb950">  ✓ 8 changes — each builds + tests by itself. Create the stack?</text>
  </g>
</svg>
