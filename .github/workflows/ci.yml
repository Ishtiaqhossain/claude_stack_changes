name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detector:
    name: review-system detector matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fixture matrix (incl. adversarial)
        run: bash stack-changes/scripts/detect-review-system.test.sh

  demos:
    name: demo suites (final state)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: demo (expense-report, npm)
        run: cd validation/demo && npm run build && npm test
      - name: demo-split (unit-convert, npm)
        run: cd validation/demo-split/unit-convert && npm run build && npm test
      - name: demo-py (report, python)
        run: cd validation/demo-py && python3 -m py_compile *.py && python3 -m unittest

  verify-stack:
    name: per-revision stack verification (npm + python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need all branches + tags to walk the stacks
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: fetch all branches + tags
        run: git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*' --tags
      - name: walk each stack node — checkout, build, test, read exit code
        run: |
          # Copy the verifier out of the work tree so branch checkouts can't remove it mid-run.
          cp validation/scripts/verify-stack.sh "$RUNNER_TEMP/vs.sh"
          # NOTE: these stack branches/tags predate the validation/ reorg, so on them the
          # demos still live at the repo root — keep `cd demo` / `cd demo-py` below.
          echo "== npm stack (demo/) =="
          bash "$RUNNER_TEMP/vs.sh" "cd demo && npm run build && npm test" \
            expense-stack/1-model expense-stack/2-query-pipeline expense-stack/3-formatter-seam \
            expense-stack/4-formatters expense-stack/5-filtering expense-stack/6-sort-group \
            expense-stack/7-budgets expense-stack/8-cli
          echo "== python stack (demo-py/) =="
          bash "$RUNNER_TEMP/vs.sh" "cd demo-py && python3 -m py_compile *.py && python3 -m unittest" \
            py-0 py-1 py-2 py-3

  corpus:
    name: independent corpus (external repos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Clones a real external repo the author didn't build, splits a bundled
      # change, and verifies each node in isolation — independence + objective check.
      - name: yocto-queue — split a bundled change, verify each node
        run: bash validation/eval/corpus/yocto-queue.sh
