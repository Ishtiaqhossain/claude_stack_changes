name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detector:
    name: review-system detector matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fixture matrix (incl. adversarial)
        run: bash stack-changes/scripts/detect-review-system.test.sh

  demos:
    name: demo suites (final state)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: demo (expense-report, npm)
        run: cd validation/demo && npm run build && npm test
      - name: demo-split (unit-convert, npm)
        run: cd validation/demo-split/unit-convert && npm run build && npm test
      - name: demo-py (report, python)
        run: cd validation/demo-py && python3 -m py_compile *.py && python3 -m unittest

  verify-stack:
    name: per-revision stack verification (npm + python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need all branches + tags to walk the stacks
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: fetch all branches + tags
        run: git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*' --tags
      - name: walk each stack node — checkout, build, test, read exit code
        run: |
          # Copy the verifier out of the work tree so branch checkouts can't remove it mid-run.
          cp validation/scripts/verify-stack.sh "$RUNNER_TEMP/vs.sh"
          # NOTE: the demo stack branches are based on the demo's own base, so the demo
          # lives at the repo root on them — keep `cd demo` / `cd demo-py` below.
          # Discover the expense-stack/* branches dynamically so a demo regen (which can
          # change the node count/names) never leaves this list stale.
          echo "== npm stack (demo/) =="
          npm_stack=$(git for-each-ref --format='%(refname:short)' --sort=refname \
            'refs/remotes/origin/expense-stack/*' | sed 's#^origin/##')
          bash "$RUNNER_TEMP/vs.sh" "cd demo && npm run build && npm test" $npm_stack
          echo "== python stack (demo-py/) =="
          bash "$RUNNER_TEMP/vs.sh" "cd demo-py && python3 -m py_compile *.py && python3 -m unittest" \
            py-0 py-1 py-2 py-3

  corpus:
    name: corpus ${{ matrix.entry }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one ecosystem failing shouldn't hide the others
      matrix:
        include:
          - { entry: 'yocto-queue (node)',      toolchain: node,   script: validation/eval/corpus/yocto-queue.sh }
          - { entry: 'more-itertools (python)', toolchain: python, script: validation/eval/corpus/more-itertools.sh }
          - { entry: 'google/uuid (go)',        toolchain: go,     script: validation/eval/corpus/google-uuid.sh }
    steps:
      - uses: actions/checkout@v4
      # Each entry clones a real external repo the author didn't build, splits a
      # bundled change, and verifies each node in isolation. Breadth across build
      # systems lives here because the local sandbox lacks current toolchains
      # (Python 3.9, no Go/Cargo/Gradle) — CI provides them. See VALIDATION.md.
      - if: matrix.toolchain == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - if: matrix.toolchain == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - if: matrix.toolchain == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: split a bundled change, verify each node
        run: bash ${{ matrix.script }}

  readme-fresh:
    name: README flagship block in sync with the demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need main + monolith/expense-report + expense-stack/* history
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: fetch demo branches
        run: git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*'
      - name: regenerate the flagship block and assert no drift
        run: |
          node validation/scripts/gen-readme.mjs
          git diff --exit-code README.md \
            || { echo '::error::README flagship-demo block is stale — run `node validation/scripts/gen-readme.mjs` and commit.'; exit 1; }
